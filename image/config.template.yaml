# Based on https://gitea.com/gitea/runner/src/tag/v0.6.1/internal/pkg/config/config.example.yaml

log:
  # The level of logging, can be trace, debug, info, warn, error, fatal
  level: ${GITEA_RUNNER_LOG_LEVEL:-info}

runner:
  # Where to store the registration result.
  file: '${GITEA_RUNNER_REGISTRATION_FILE:-/data/.runner}'
  # Execute how many tasks concurrently at the same time.
  capacity: ${GITEA_RUNNER_MAX_PARALLEL_JOBS:-1}
  # Extra environment variables to run jobs.
  envs:
    ${GITEA_RUNNER_ENV_VAR_1_NAME:-GITEA_RUNNER_ENV_VAR_1}: '${GITEA_RUNNER_ENV_VAR_1_VALUE:-}' # GITEA_RUNNER_ENV_VAR_1
    ${GITEA_RUNNER_ENV_VAR_2_NAME:-GITEA_RUNNER_ENV_VAR_2}: '${GITEA_RUNNER_ENV_VAR_2_VALUE:-}' # GITEA_RUNNER_ENV_VAR_2
    ${GITEA_RUNNER_ENV_VAR_3_NAME:-GITEA_RUNNER_ENV_VAR_3}: '${GITEA_RUNNER_ENV_VAR_3_VALUE:-}' # GITEA_RUNNER_ENV_VAR_3
    ${GITEA_RUNNER_ENV_VAR_4_NAME:-GITEA_RUNNER_ENV_VAR_4}: '${GITEA_RUNNER_ENV_VAR_4_VALUE:-}' # GITEA_RUNNER_ENV_VAR_4
    ${GITEA_RUNNER_ENV_VAR_5_NAME:-GITEA_RUNNER_ENV_VAR_5}: '${GITEA_RUNNER_ENV_VAR_5_VALUE:-}' # GITEA_RUNNER_ENV_VAR_5
    ${GITEA_RUNNER_ENV_VAR_6_NAME:-GITEA_RUNNER_ENV_VAR_6}: '${GITEA_RUNNER_ENV_VAR_6_VALUE:-}' # GITEA_RUNNER_ENV_VAR_6
    ${GITEA_RUNNER_ENV_VAR_7_NAME:-GITEA_RUNNER_ENV_VAR_7}: '${GITEA_RUNNER_ENV_VAR_7_VALUE:-}' # GITEA_RUNNER_ENV_VAR_7
    ${GITEA_RUNNER_ENV_VAR_8_NAME:-GITEA_RUNNER_ENV_VAR_8}: '${GITEA_RUNNER_ENV_VAR_8_VALUE:-}' # GITEA_RUNNER_ENV_VAR_8
    ${GITEA_RUNNER_ENV_VAR_9_NAME:-GITEA_RUNNER_ENV_VAR_9}: '${GITEA_RUNNER_ENV_VAR_9_VALUE:-}' # GITEA_RUNNER_ENV_VAR_9
  # Extra environment variables to run jobs from a file.
  # It will be ignored if it's empty or the file doesn't exist.
  env_file: '${GITEA_RUNNER_ENV_FILE:-/data/.env}'
  # The timeout for a job to be finished.
  # Please note that the Gitea instance also has a timeout (3h by default) for the job.
  # So the job could be stopped by the Gitea instance if it's timeout is shorter than this.
  timeout: '${GITEA_RUNNER_JOB_TIMEOUT:-3h}'
  # The timeout for the runner to wait for running jobs to finish when shutting down.
  # Any running jobs that haven't finished after this timeout will be cancelled.
  shutdown_timeout: ${GITEA_RUNNER_SHUTDOWN_TIMEOUT:-0s}
  # Whether skip verifying the TLS certificate of the Gitea instance.
  insecure: ${GITEA_INSTANCE_INSECURE:-false}
  # The timeout for fetching the job from the Gitea instance.
  fetch_timeout: '${GITEA_RUNNER_FETCH_TIMEOUT:-5s}'
  # The interval for fetching the job from the Gitea instance.
  fetch_interval: '${GITEA_RUNNER_FETCH_INTERVAL:-2s}'
  # The maximum interval for fetching the job from the Gitea instance.
  # The runner uses exponential backoff when idle, increasing the interval up to this maximum.
  # Set to 0 or same as fetch_interval to disable backoff.
  fetch_interval_max: '${GITEA_RUNNER_FETCH_INTERVAL_MAX:-2s}'
  # The base interval for periodic log flush to the Gitea instance.
  # Logs may be sent earlier if the buffer reaches log_report_batch_size
  # or if log_report_max_latency expires after the first buffered row.
  log_report_interval: '${GITEA_RUNNER_LOG_REPORT_INTERVAL:-5s}'
  # The maximum time a log row can wait before being sent.
  # This ensures even a single log line appears on the frontend within this duration.
  # Must be less than log_report_interval to have any effect.
  log_report_max_latency: '${GITEA_RUNNER_LOG_MAX_LATENCY:-3s}'
  # Flush logs immediately when the buffer reaches this many rows.
  # This ensures bursty output (e.g., npm install) is delivered promptly.
  log_report_batch_size: ${GITEA_RUNNER_BATCH_SIZE:-100}
  # The interval for reporting task state (step status, timing) to the Gitea instance.
  # State is also reported immediately on step transitions (start/stop).
  state_report_interval: '${GITEA_RUNNER_STATE_REPORT_INTERVAL:-5s}'
  # The github_mirror of a runner is used to specify the mirror address of the github that pulls the action repository.
  # It works when something like `uses: actions/checkout@v4` is used and DEFAULT_ACTIONS_URL is set to github,
  # and github_mirror is not empty. In this case,
  # it replaces https://github.com with the value here, which is useful for some special network environments.
  github_mirror: '${GITEA_RUNNER_GITHUB_MIRROR:-}'
  # The labels of a runner are used to determine which jobs the runner can run, and how to run them.
  # Like: "macos-arm64:host" or "ubuntu-latest:docker://docker.gitea.com/runner-images:ubuntu-latest"
  # Find more images provided by Gitea at https://gitea.com/docker.gitea.com/runner-images .
  # If it's empty when registering, it will ask for inputting labels.
  # If it's empty when execute `daemon`, will use labels in `.runner` file.
  labels: [ "${GITEA_RUNNER_LABELS//,/","}" ]

cache:
  # Enable cache server to use actions/cache.
  enabled: ${ACT_CACHE_SERVER_ENABLED:-true}
  # The directory to store the cache data.
  # If it's empty, the cache data will be stored in $HOME/.cache/actcache.
  dir: '${ACT_CACHE_SERVER_DIR:-/data/cache/server}'
  # The host of the cache server.
  # It's not for the address to listen, but the address to connect from job containers.
  # So 0.0.0.0 is a bad choice, leave it empty to detect automatically.
  host: '${ACT_CACHE_SERVER_HOST:-}'
  # The port of the cache server.
  # 0 means to use a random available port.
  port: ${ACT_CACHE_SERVER_PORT:-0}
  # The external cache server URL. Valid only when enable is true.
  # If it's specified, gitea-runner will use this URL as the ACTIONS_CACHE_URL rather than start a server by itself.
  # The URL should generally end with "/".
  # Requires external_secret below to be set to the same value on both this runner and the cache-server.
  external_server: '${ACT_CACHE_SERVER_EXTERNAL_URL:-}'
  # Shared secret between this runner and the external `gitea-runner cache-server`. Required when external_server
  # (or `gitea-runner cache-server`) is in use: the runner pre-registers each job's ACTIONS_RUNTIME_TOKEN with the
  # cache-server, and the cache-server enforces bearer auth + per-repo cache isolation.
  external_secret: '${ACT_CACHE_SERVER_EXTERNAL_SECRET:-}'

container:
  # Specifies the network to which the container will connect.
  # Could be host, bridge or the name of a custom network.
  # If it's empty, gitea-runner will create a network automatically.
  network: '${GITEA_RUNNER_JOB_CONTAINER_NETWORK:-bridge}'
  # Whether to use privileged mode or not when launching task containers (privileged mode is required for Docker-in-Docker).
  privileged: ${GITEA_RUNNER_JOB_CONTAINER_PRIVILEGED:-false}
  # Any other options to be used when the container is started (e.g., --add-host=my.gitea.url:host-gateway).
  options: '${GITEA_RUNNER_JOB_CONTAINER_OPTIONS:-}'
  # The parent directory of a job's working directory.
  # NOTE: There is no need to add the first '/' of the path as gitea-runner will add it automatically.
  # If the path starts with '/', the '/' will be trimmed.
  # For example, if the parent directory is /path/to/my/dir, workdir_parent should be path/to/my/dir
  # If it's empty, /workspace will be used.
  workdir_parent: ${GITEA_RUNNER_JOB_CONTAINER_WORKDIR_PARENT:-/workspace}
  # Volumes (including bind mounts) can be mounted to containers. Glob syntax is supported, see https://github.com/gobwas/glob
  # You can specify multiple volumes. If the sequence is empty, no volumes can be mounted.
  # For example, if you only allow containers to mount the `data` volume and all the json files in `/src`, you should change the config to:
  # valid_volumes:
  #   - data
  #   - /src/*.json
  # If you want to allow any volume, please use the following configuration:
  # valid_volumes:
  #   - '**'
  valid_volumes:
    - '${GITEA_RUNNER_VALID_VOLUME_1:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_1
    - '${GITEA_RUNNER_VALID_VOLUME_2:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_2
    - '${GITEA_RUNNER_VALID_VOLUME_3:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_3
    - '${GITEA_RUNNER_VALID_VOLUME_4:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_4
    - '${GITEA_RUNNER_VALID_VOLUME_5:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_5
    - '${GITEA_RUNNER_VALID_VOLUME_6:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_6
    - '${GITEA_RUNNER_VALID_VOLUME_7:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_7
    - '${GITEA_RUNNER_VALID_VOLUME_8:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_8
    - '${GITEA_RUNNER_VALID_VOLUME_9:-/dev/null}' # GITEA_RUNNER_VALID_VOLUME_9
  # Overrides the docker client host with the specified one.
  # If it's empty, gitea-runner will find an available docker host automatically.
  # If it's "-", gitea-runner will find an available docker host automatically, but the docker host won't be mounted to the job containers and service containers.
  # If it's not empty or "-", the specified docker host will be used. An error will be returned if it doesn't work.
  docker_host: '${GITEA_RUNNER_JOB_CONTAINER_DOCKER_HOST:-}'
  # Pull docker image(s) even if already present
  force_pull: ${GITEA_RUNNER_JOB_CONTAINER_FORCE_PULL:-true}
  # Rebuild docker image(s) even if already present
  force_rebuild: ${GITEA_RUNNER_JOB_CONTAINER_FORCE_REBUILD:-false}
  # Always require a reachable docker daemon, even if not required by gitea-runner
  require_docker: ${GITEA_RUNNER_JOB_REQUIRE_DOCKER:-false}
  # Timeout to wait for the docker daemon to be reachable, if docker is required by require_docker or gitea-runner
  docker_timeout: ${GITEA_RUNNER_JOB_CONTAINER_TIMEOUT:-0s}
  # Bind the workspace to the host filesystem instead of using Docker volumes.
  # This is required for Docker-in-Docker (DinD) setups when jobs use docker compose
  # with bind mounts (e.g., ".:/app"), as volume-based workspaces are not accessible
  # from the DinD daemon's filesystem. When enabled, ensure the workspace parent
  # directory is also mounted into the runner container and listed in valid_volumes.
  bind_workdir: ${GITEA_RUNNER_JOB_CONTAINER_BIND_WORKDIR:-false}

host:
  # The parent directory of a job's working directory.
  # If it's empty, $HOME/.cache/act/ will be used.
  workdir_parent: '${GITEA_RUNNER_HOST_WORKDIR_PARENT:-/data/cache/actions}'

metrics:
  # Enable the Prometheus metrics endpoint.
  # When enabled, metrics are served at http://<addr>/metrics and a liveness check at /healthz.
  enabled: ${GITEA_RUNNER_METRICS_ENABLED:-false}
  # The address for the metrics HTTP server to listen on.
  # Defaults to localhost only. Set to ":9101" to allow external access,
  # but ensure the port is firewall-protected as there is no authentication.
  addr: ${GITEA_RUNNER_METRICS_ADDR:-127.0.0.1:9101}
